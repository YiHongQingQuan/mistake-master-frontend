<script>
        // --- API Configuration ---
        const API_BASE = 'https://test-production-8b64.up.railway.app';

        // API Request Function with JWT Token
        async function apiRequest(endpoint, method = 'GET', data = null) {
            const url = API_BASE + endpoint;
            const token = localStorage.getItem('jwtToken');
            const options = {
                method,
                headers: {
                    'Content-Type': 'application/json'
                }
            };

            if (token) {
                options.headers['Authorization'] = `Bearer ${token}`;
            }

            if (data) {
                options.body = JSON.stringify(data);
            }

            try {
                const response = await fetch(url, options);
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '请求失败');
                }
                return result;
            } catch (error) {
                if (error.message === '认证失败') {
                    // Token expired or invalid, redirect to login
                    localStorage.removeItem('jwtToken');
                    window.location.href = 'login.html';
                }
                throw error;
            }
        }

        // --- Data & State Management ---
        
        const defaultSubjects = {
            "数学": { points: ["代数", "几何", "概率统计"], types: ["选择题", "填空题", "判断题", "解答题", "计算题"] },
            "语文": { points: ["基础知识", "阅读理解", "作文"], types: ["选择题", "填空题", "判断题", "解答题", "阅读题"] },
            "英语": { points: ["词汇", "语法", "写作"], types: ["选择题", "填空题", "阅读题", "写作题"] },
            "物理": { points: ["力学", "电学", "光学"], types: ["选择题", "填空题", "实验题", "计算题"] },
            "化学": { points: ["无机", "有机", "实验"], types: ["选择题", "填空题", "实验题", "推断题"] },
            "生物": { points: ["细胞", "遗传", "生态"], types: ["选择题", "填空题", "判断题", "解答题"] }
        };

        let appData = {
            subjects: JSON.parse(JSON.stringify(defaultSubjects)),
            questions: []
        };

        let currentPage = 1;
        const itemsPerPage = 20;
        let reviewState = {
            queue: [],
            currentIndex: 0,
            results: {}, // { questionId: { userAnswer: string, isCorrect: boolean } }
            mode: 'all' // 'all' or 'random'
        };

        // --- Initialization ---

        document.addEventListener('DOMContentLoaded', async () => {
            // Check if token exists
            if (!localStorage.getItem('jwtToken')) {
                window.location.href = 'login.html';
                return;
            }

            try {
                await loadData();
                initEntryForm();
                renderManageList();
                updateReviewFilters();
            } catch (error) {
                showToast('数据加载失败: ' + error.message, 'error');
            }
            
            // Add image input change listener
            document.getElementById('entryImage').addEventListener('change', function(e) {
                const imagePreviewText = document.getElementById('imagePreviewText');
                if (this.files && this.files[0]) {
                    imagePreviewText.textContent = this.files[0].name;
                } else {
                    imagePreviewText.textContent = '未选择图片';
                }
            });
        });

        async function loadData() {
            try {
                // Load mistakes from API
                const mistakesResponse = await apiRequest('/api/mistakes');
                appData.questions = mistakesResponse.mistakes || [];
                
                // Load categories from API
                const categoriesResponse = await apiRequest('/api/categories');
                const categories = categoriesResponse.categories || [];
                
                // Transform categories into appData.subjects structure
                appData.subjects = {};
                
                // Group categories by type
                const subjects = categories.filter(cat => cat.type === 'subject');
                const knowledgePoints = categories.filter(cat => cat.type === 'knowledgePoint');
                const questionTypes = categories.filter(cat => cat.type === 'questionType');
                
                // Initialize subjects
                subjects.forEach(subject => {
                    appData.subjects[subject.name] = {
                        points: [],
                        types: []
                    };
                });
                
                // Add knowledge points to corresponding subjects
                // Note: This is a simplified approach - in a real app, you might want to associate knowledge points with specific subjects
                knowledgePoints.forEach(point => {
                    // Add to all subjects for now
                    Object.keys(appData.subjects).forEach(subject => {
                        appData.subjects[subject].points.push(point.name);
                    });
                });
                
                // Add question types to all subjects
                questionTypes.forEach(type => {
                    Object.keys(appData.subjects).forEach(subject => {
                        appData.subjects[subject].types.push(type.name);
                    });
                });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            let bgClass = 'bg-gray-800';
            let icon = '<i class="fa-solid fa-circle-info"></i>';
            
            if (type === 'success') { bgClass = 'bg-green-600'; icon = '<i class="fa-solid fa-circle-check"></i>'; }
            if (type === 'error') { bgClass = 'bg-red-600'; icon = '<i class="fa-solid fa-circle-exclamation"></i>'; }
            if (type === 'warning') { bgClass = 'bg-orange-500'; icon = '<i class="fa-solid fa-triangle-exclamation"></i>'; }

            toast.className = `${bgClass} text-white px-6 py-3 rounded shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-y-10 opacity-0`;
            toast.innerHTML = `${icon} <span>${message}</span>`;
            
            container.appendChild(toast);
            
            // Animation in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            // Auto remove
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');

                });

                filtered = filtered.filter(q => q.subject === filterSub.value);
            }
            
            // Search logic
            if (searchTerm) {
                filtered = filtered.filter(q => {

                           q.answer.toLowerCase().includes(searchTerm) ||
                           (q.notes && q.notes.toLowerCase().includes(searchTerm)) ||
                           q.point.toLowerCase().includes(searchTerm) ||

        async function deleteCategory(type, subject, value) {
            try {
                // Map type to API category type
                let categoryType;
                if (type === 'subject') {
                    categoryType = 'subject';
                } else if (type === 'point') {
                    categoryType = 'knowledgePoint';
                } else if (type === 'type') {
                    categoryType = 'questionType';
                }
                
                // First get all categories to find the ID
                const categoriesResponse = await apiRequest('/api/categories');
                const categories = categoriesResponse.categories || [];
                
                // Find the category to delete
                const categoryToDelete = categories.find(cat => 
                    cat.type === categoryType && cat.name === value
                );
                
                if (!categoryToDelete) {
                    showToast('分类不存在', 'error');
                    return;
                }
                
                // Call API to delete category
                await apiRequest(`/api/categories/${categoryToDelete._id}`, 'DELETE');
                
                // Update local state
                if(type === 'subject') {
                    delete appData.subjects[subject];
                } else {
                    // Remove from all subjects
                    Object.keys(appData.subjects).forEach(subj => {
                        const list = type === 'point' ? appData.subjects[subj].points : appData.subjects[subj].types;
                        const idx = list.indexOf(value);
                        if(idx > -1) list.splice(idx, 1);
                    });
                }
                
                renderCategoryManager();
                initEntryForm();
                showToast('删除成功', 'success');
            } catch (error) {
                showToast('删除失败: ' + error.message, 'error');
            }
        }

        async function renameCategory(type, subject, value) {
            openSimpleInputModal("重命名", async (newVal) => {
                if(!newVal) return;
                
                try {
                    // Map type to API category type
                    let categoryType;
                    if (type === 'subject') {
                        categoryType = 'subject';
                    } else if (type === 'point') {
                        categoryType = 'knowledgePoint';
                    } else if (type === 'type') {
                        categoryType = 'questionType';
                    }
                    
                    // First get all categories to find the ID
                    const categoriesResponse = await apiRequest('/api/categories');
                    const categories = categoriesResponse.categories || [];
                    
                    // Find the category to update
                    const categoryToUpdate = categories.find(cat => 
                        cat.type === categoryType && cat.name === value
                    );
                    
                    if (!categoryToUpdate) {
                        showToast('分类不存在', 'error');
                        return;
                    }
                    
                    // Call API to update category
                    await apiRequest(`/api/categories/${categoryToUpdate._id}`, 'PUT', {
                        name: newVal
                    });
                    
                    // Update local state
                    if(type === 'subject') {
                        appData.subjects[newVal] = appData.subjects[subject];
                        delete appData.subjects[subject];
                        // Update questions
                        appData.questions.forEach(q => { if(q.subject === subject) q.subject = newVal; });
                    } else {
                        // Update in all subjects
                        Object.keys(appData.subjects).forEach(subj => {
                            const list = type === 'point' ? appData.subjects[subj].points : appData.subjects[subj].types;
                            const idx = list.indexOf(value);
                            if(idx > -1) list[idx] = newVal;
                        });
                        // Update questions
                        const field = type === 'point' ? 'knowledgePoint' : 'questionType';
                        appData.questions.forEach(q => { if(q[field] === value) q[field] = newVal; });
                    }
                    
                    renderCategoryManager();
                    initEntryForm();
                    showToast('重命名成功', 'success');
                } catch (error) {
                    showToast('重命名失败: ' + error.message, 'error');
                }
            }, value);
        }

        function openSimpleInputModal(title, callback, defaultValue = '') {
            const html = `
                <h3 class="text-lg font-bold mb-4">${title}</h3>
                <input type="text" id="simpleInput" class="w-full border p-2 rounded mb-4" value="${defaultValue}">
                <div class="flex justify-end gap-2">
                    <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                    <button id="simpleInputConfirm" class="px-4 py-2 bg-indigo-600 text-white rounded">确定</button>
                </div>
            `;
            showModal(html);
            const input = document.getElementById('simpleInput');
            input.focus();
            input.select();
            
            const confirm = () => {
                callback(input.value.trim());
                closeModal();
            };

            document.getElementById('simpleInputConfirm').onclick = confirm;
            input.onkeypress = (e) => { if(e.key === 'Enter') confirm(); };
        }

        // --- Module 3: Review Logic ---

        function updateReviewFilters() {
            const subSelect = document.getElementById('reviewSubject');
            const currentVal = subSelect.value;
            
            subSelect.innerHTML = '<option value="">请选择科目...</option>';
            Object.keys(appData.subjects).forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.textContent = sub;
                subSelect.appendChild(opt);
            });
            
            if(currentVal) subSelect.value = currentVal;
            
            const sub = subSelect.value;
            const pointSelect = document.getElementById('reviewPoint');
            const typeSelect = document.getElementById('reviewType');

            pointSelect.innerHTML = '<option value="all">不限</option>';
            typeSelect.innerHTML = '<option value="all">不限</option>';

            if (sub && appData.subjects[sub]) {
                appData.subjects[sub].points.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p;
                    opt.textContent = p;
                    pointSelect.appendChild(opt);
                });
                appData.subjects[sub].types.forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    typeSelect.appendChild(opt);
                });
            }
        }

        function openRandomCountModal() {
            const html = `
                <h3 class="text-xl font-bold mb-4">抽题练习</h3>
                <p class="mb-2 text-gray-600">请输入抽题数量：</p>
                <input type="number" id="randomCount" class="w-full border p-2 rounded mb-4" min="1" max="100">
                <div class="flex justify-end gap-2">
                    <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                    <button onclick="startReview('random')" class="px-4 py-2 bg-indigo-600 text-white rounded">开始</button>
                </div>
            `;
            showModal(html);
            setTimeout(() => document.getElementById('randomCount').focus(), 100);
        }

        function startReview(mode) {
            const subject = document.getElementById('reviewSubject').value;
            if (!subject) {
                showToast('请选择科目', 'warning');
                return;
            }

            const point = document.getElementById('reviewPoint').value;
            const type = document.getElementById('reviewType').value;

            // Filter questions
            let pool = appData.questions.filter(q => q.subject === subject);
            if (point !== 'all') pool = pool.filter(q => q.point === point);
            if (type !== 'all') pool = pool.filter(q => q.type === type);

            if (pool.length === 0) {
                showToast('没有符合条件的错题', 'info');
                return;
            }

            // Determine queue
            if (mode === 'random') {
                const countInput = document.getElementById('randomCount');
                let count = parseInt(countInput ? countInput.value : 10);
                if (isNaN(count) || count < 1) count = 10;
                // Shuffle
                pool = pool.sort(() => 0.5 - Math.random());
                reviewState.queue = pool.slice(0, Math.min(count, pool.length));
                closeModal();
            } else {
                reviewState.queue = pool;
            }

            // Reset state
            reviewState.currentIndex = 0;
            reviewState.results = {};
            reviewState.mode = mode;

            // Switch UI
            document.getElementById('reviewSetup').classList.add('hidden');
            document.getElementById('reviewResult').classList.add('hidden');
            document.getElementById('reviewInterface').classList.remove('hidden');
            
            loadReviewQuestion();
        }

        function loadReviewQuestion() {
            const q = reviewState.queue[reviewState.currentIndex];
            const total = reviewState.queue.length;
            
            // Update Header
            document.getElementById('reviewCurrentSubject').textContent = q.subject;
            document.getElementById('reviewCurrentType').textContent = q.type;
            document.getElementById('reviewCounter').textContent = `${reviewState.currentIndex + 1} / ${total}`;
            document.getElementById('reviewProgressBar').style.width = `${((reviewState.currentIndex) / total) * 100}%`;

            // Content
            document.getElementById('reviewQuestionStem').textContent = q.stem;
            
            // Image
            const imageContainer = document.getElementById('reviewQuestionImage');
            if (q.image) {
                imageContainer.innerHTML = `<img src="${q.image}" alt="题目图片" class="max-w-full max-h-60 object-contain rounded-md border">`;
            } else {
                imageContainer.innerHTML = '';
            }
            
            // Input Area
            const inputArea = document.getElementById('reviewInputArea');
            const feedback = document.getElementById('reviewFeedback');
            const btnSubmit = document.getElementById('btnSubmit');
            const btnNext = document.getElementById('btnNext');
            const btnFinish = document.getElementById('btnFinish');
            const btnPrev = document.getElementById('btnPrev');

            inputArea.classList.remove('hidden');
            feedback.classList.add('hidden');
            btnSubmit.classList.remove('hidden');
            btnNext.classList.add('hidden');
            
            // Check if already answered
            if (reviewState.results[q.id]) {
                // Show result state
                document.getElementById('reviewUserAnswer').value = reviewState.results[q.id].userAnswer;
                showFeedback(q, reviewState.results[q.id].userAnswer);
                inputArea.classList.add('hidden'); // Hide input to prevent re-edit (optional, but cleaner)
                btnSubmit.classList.add('hidden');
                
                if (reviewState.currentIndex < total - 1) {
                    btnNext.classList.remove('hidden');
                } else {
                    btnFinish.classList.remove('hidden');
                }
            } else {
                document.getElementById('reviewUserAnswer').value = '';
                btnFinish.classList.add('hidden');
                btnNext.classList.add('hidden');
            }

            // Prev Button
            btnPrev.disabled = reviewState.currentIndex === 0;
        }

        function submitAnswer() {
            const q = reviewState.queue[reviewState.currentIndex];
            const userAns = document.getElementById('reviewUserAnswer').value.trim();
            
            if (!userAns) {
                showToast('请输入答案', 'warning');
                return;
            }

            // Simple string comparison. In a real app, this might be more complex.
            const isCorrect = userAns === q.answer.trim();
            
            reviewState.results[q.id] = {
                userAnswer: userAns,
                isCorrect: isCorrect
            };

            showFeedback(q, userAns);
            
            document.getElementById('reviewInputArea').classList.add('hidden');
            document.getElementById('btnSubmit').classList.add('hidden');

            const total = reviewState.queue.length;
            if (reviewState.currentIndex < total - 1) {
                document.getElementById('btnNext').classList.remove('hidden');
            } else {
                document.getElementById('btnFinish').classList.remove('hidden');
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            }
        }

        function showFeedback(q, userAns) {
            const feedback = document.getElementById('reviewFeedback');
            const icon = document.getElementById('feedbackIcon');
            const text = document.getElementById('feedbackText');
            const correctTxt = document.getElementById('feedbackCorrectAnswer');

            feedback.classList.remove('hidden', 'bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            
            const isCorrect = userAns === q.answer.trim();

            if (isCorrect) {
                feedback.classList.add('bg-green-50', 'border-green-200');
                icon.innerHTML = '<i class="fa-solid fa-circle-check text-green-600"></i>';
                text.textContent = '回答正确！';
                text.className = 'font-bold text-lg text-green-700';
            } else {
                feedback.classList.add('bg-red-50', 'border-red-200');
                icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-600"></i>';
                text.textContent = '回答错误';
                text.className = 'font-bold text-lg text-red-700';
            }
            correctTxt.textContent = q.answer;
        }

        function navigateReview(dir) {
            reviewState.currentIndex += dir;
            loadReviewQuestion();
        }

        function finishReview() {
            document.getElementById('reviewInterface').classList.add('hidden');
            document.getElementById('reviewResult').classList.remove('hidden');

            const total = reviewState.queue.length;
            let correct = 0;
            const detailsContainer = document.getElementById('resultDetails');
            detailsContainer.innerHTML = '';

            reviewState.queue.forEach((q, idx) => {
                const res = reviewState.results[q.id];
                if (res && res.isCorrect) correct++;

                const div = document.createElement('div');
                div.className = `p-3 rounded border ${res && res.isCorrect ? 'bg-green-50 border-green-100' : 'bg-red-50 border-red-100'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-1">
                        <span class="font-bold text-sm">第 ${idx+1} 题</span>
                        <span class="${res && res.isCorrect ? 'text-green-600' : 'text-red-600'} text-xs font-bold">
                            ${res && res.isCorrect ? '正确' : '错误'}
                        </span>
                    </div>
                    <p class="text-xs text-gray-600 line-clamp-2 mb-1">${q.stem}</p>
                    <p class="text-xs"><span class="font-semibold">你的答案：</span>${res ? res.userAnswer : '未作答'}</p>
                    ${(!res || !res.isCorrect) ? `<p class="text-xs text-green-700"><span class="font-semibold">正确答案：</span>${q.answer}</p>` : ''}
                `;
                detailsContainer.appendChild(div);
            });

            document.getElementById('resultTotal').textContent = total;
            document.getElementById('resultCorrect').textContent = correct;
            document.getElementById('resultRate').textContent = total === 0 ? '0%' : Math.round((correct / total) * 100) + '%';
        }

        function resetReview() {
            document.getElementById('reviewResult').classList.add('hidden');
            document.getElementById('reviewSetup').classList.remove('hidden');
            reviewState.queue = [];
            reviewState.results = {};
            reviewState.currentIndex = 0;
        }

        // --- Module 4: Import/Export Logic ---

        function exportData() {
            const dataStr = JSON.stringify(appData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const date = new Date().toISOString().split('T')[0];
            const a = document.createElement('a');
            a.href = url;
            a.download = `错题备份_${date}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('导出成功', 'success');
        }

        let importMode = 'add'; // 'add' or 'overwrite'
        
        function triggerImport(mode) {
            importMode = mode;
            if (mode === 'overwrite') {
                showModal(`
                    <h3 class="text-xl font-bold mb-4 text-red-600">危险操作确认</h3>
                    <p class="mb-6">此操作将清空所有现有数据，是否继续？</p>
                    <div class="flex justify-end gap-2">
                        <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                        <button onclick="confirmOverwrite()" class="px-4 py-2 bg-red-600 text-white rounded">继续</button>
                    </div>
                `);
            } else {
                document.getElementById('fileInput').click();
            }
        }

        function confirmOverwrite() {
            closeModal();
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (!importedData.subjects || !importedData.questions) {
                        throw new Error('Invalid format');
                    }

                    if (importMode === 'overwrite') {
                        appData = importedData;
                        saveData();
                        showToast('数据覆盖成功', 'success');
                    } else {
                        // Add Mode - Check ID conflicts
                        const existingIds = new Set(appData.questions.map(q => q.id));
                        const newIds = new Set(importedData.questions.map(q => q.id));
                        let hasConflict = false;
                        for (let id of newIds) {
                            if (existingIds.has(id)) {
                                hasConflict = true;
                                break;
                            }
                        }

                        if (hasConflict) {
                            showModal(`
                                <h3 class="text-xl font-bold mb-4 text-orange-600">ID冲突检测</h3>
                                <p class="mb-6">存在ID相同的题目，继续导入新题目会覆盖ID相同的旧题目，是否继续？</p>
                                <div class="flex justify-end gap-2">
                                    <button onclick="closeModal(); resetFileInput();" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                                    <button onclick="executeMerge(importedData)" class="px-4 py-2 bg-orange-600 text-white rounded">继续</button>
                                </div>
                            `);
                        } else {
                            executeMerge(importedData);
                        }
                    }

                    // Refresh UI
                    initEntryForm();
                    renderManageList();
                    updateReviewFilters();

                } catch (err) {
                    showToast('文件格式错误', 'error');
                    console.error(err);
                }
                resetFileInput();
            };
            reader.readAsText(file);
        }

        function executeMerge(newData) {
            closeModal();
            // Merge Subjects (Simple union strategy for categories)
            for (let sub in newData.subjects) {
                if (!appData.subjects[sub]) {
                    appData.subjects[sub] = newData.subjects[sub];
                } else {
                    // Merge points and types
                    newData.subjects[sub].points.forEach(p => {
                        if (!appData.subjects[sub].points.includes(p)) appData.subjects[sub].points.push(p);
                    });
                    newData.subjects[sub].types.forEach(t => {
                        if (!appData.subjects[sub].types.includes(t)) appData.subjects[sub].types.push(t);
                    });
                }
            }

            // Merge Questions (Overwrite by ID)
            const existingMap = new Map(appData.questions.map(q => [q.id, q]));
            newData.questions.forEach(q => {
                existingMap.set(q.id, q);
            });
            appData.questions = Array.from(existingMap.values());

            saveData();
            showToast('数据导入成功', 'success');
        }

        function resetFileInput() {
            document.getElementById('fileInput').value = '';
        }

        function confirmClearData() {
            showModal(`
                <h3 class="text-xl font-bold mb-4 text-red-600">确认清空</h3>
                <p class="mb-6">确定要清除所有本地数据吗？此操作无法撤销。</p>
                <div class="flex justify-end gap-2">
                    <button onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded">取消</button>
                    <button onclick="executeClearData()" class="px-4 py-2 bg-red-600 text-white rounded">确定清空</button>
                </div>
            `);
        }

        function executeClearData() {
            closeModal();
            appData = {
                subjects: JSON.parse(JSON.stringify(defaultSubjects)),
                questions: []
            };
            saveData();
            initEntryForm();
            renderManageList();
            updateReviewFilters();
            showToast('数据已清空', 'success');
        }

    </script>
